<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Fidget Spinna</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="hud">
      <h1>Fidget Spinna</h1>
      <p>Spin with your thumb. Tilt phone to auto-stabilize.</p>
      <button id="motionBtn" type="button">Enable Motion</button>
      <button id="recenterBtn" type="button" hidden>Recenter Tilt</button>
      <p id="status">Tap and drag around center to spin.</p>
    </div>
    <canvas id="app"></canvas>
    <script type="module" src="./main.js"></script>
  </body>
</html>
