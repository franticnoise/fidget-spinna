<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Fidget Spinna</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="hud">
      <h1>Fidget Spinna</h1>
      <p>Spin with your thumb. Hold center and drag up/down to shift key.</p>
      <button id="motionBtn" type="button">Enable Motion</button>
      <button id="settingsBtn" type="button"><span aria-hidden="true">&#9881;</span> Settings</button>
      <div id="transportInline">
        <label for="tempoInput">Tempo</label>
        <input id="tempoInput" type="number" min="30" max="280" step="1" value="120" />
        <button id="transportToggleBtn" type="button">Stop</button>
      </div>
      <p id="status">Tap and drag around center to spin.</p>

      <div id="settingsPanel" hidden>
        <div class="controlRow">
          <span>Root Note</span>
          <select id="rootNoteSelect">
            <option value="C">C</option>
            <option value="C#">C#</option>
            <option value="D">D</option>
            <option value="D#">D#</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="F#">F#</option>
            <option value="G" selected>G</option>
            <option value="G#">G#</option>
            <option value="A">A</option>
            <option value="A#">A#</option>
            <option value="B">B</option>
          </select>
        </div>

        <div class="controlRow">
          <span>Scale</span>
          <select id="scaleSelect">
            <option value="minor">Minor</option>
            <option value="major">Major</option>
            <option value="harmonicMinor">Harmonic Minor</option>
            <option value="dorian">Dorian</option>
            <option value="minorPentatonic" selected>Minor Pentatonic</option>
          </select>
        </div>

        <div class="controlRow controlRowSlider">
          <span>Wing Count</span>
          <input id="wingCountSlider" type="range" min="3" max="9" step="1" value="6" />
          <span id="wingCountValue">6</span>
        </div>

        <div class="controlRow controlRowSlider">
          <span>Octave Range</span>
          <input id="octaveRangeSlider" type="range" min="0" max="4" step="1" value="2" />
          <span id="octaveRangeValue">+/-2</span>
        </div>

        <div class="controlRow controlRowSlider">
          <span>Base Octave</span>
          <input id="baseOctaveSlider" type="range" min="-4" max="4" step="1" value="0" />
          <span id="baseOctaveValue">+0</span>
        </div>

        <div class="controlRow">
          <span>Arp Direction</span>
          <select id="arpDirectionSelect">
            <option value="upDown">Up Down</option>
            <option value="downUp">Down Up</option>
            <option value="upOnly" selected>Only Up</option>
            <option value="downOnly">Only Down</option>
            <option value="random">Random</option>
          </select>
        </div>

        <div class="controlRow">
          <span>Min Arp Rate</span>
          <select id="minArpRateSelect">
            <option value="1">1/1</option>
            <option value="2">1/2</option>
            <option value="4">1/4</option>
            <option value="8" selected>1/8</option>
            <option value="16">1/16</option>
            <option value="32">1/32</option>
            <option value="64">1/64</option>
            <option value="128">1/128</option>
            <option value="256">1/256</option>
          </select>
        </div>

        <div class="controlRow">
          <span>Max Arp Rate</span>
          <select id="maxArpRateSelect">
            <option value="1">1/1</option>
            <option value="2">1/2</option>
            <option value="4">1/4</option>
            <option value="8">1/8</option>
            <option value="16">1/16</option>
            <option value="32">1/32</option>
            <option value="64">1/64</option>
            <option value="128" selected>1/128</option>
            <option value="256">1/256</option>
          </select>
        </div>

        <div class="controlRow">
          <span>Sound Source</span>
          <select id="soundSourceSelect">
            <option value="arp" selected>Arpeggiator</option>
            <option value="monotone">Monotone</option>
            <option value="ocarina">Ocarina</option>
          </select>
        </div>

        <div class="controlRow">
          <span>No Sound</span>
          <label class="switch" for="muteToggle">
            <input id="muteToggle" type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="controlRow">
          <span>No Haptics</span>
          <label class="switch" for="hapticsToggle">
            <input id="hapticsToggle" type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div id="fxDock" aria-label="Audio effects controls">
      <div class="fxControl">
        <div class="fxHeader"><label for="reverbDecaySlider">Reverb Decay</label><span id="reverbDecayValue">3.1s</span></div>
        <input id="reverbDecaySlider" type="range" min="0.2" max="10" step="0.1" value="3.1" />
      </div>
      <div class="fxControl">
        <div class="fxHeader"><label for="envReleaseSlider">Envelope Release</label><span id="envReleaseValue">310ms</span></div>
        <input id="envReleaseSlider" type="range" min="0.03" max="1.2" step="0.01" value="0.31" />
      </div>
      <div class="fxControl">
        <div class="fxHeader"><label for="delayTimeSlider">Delay Time</label><span id="delayTimeValue">60ms</span></div>
        <input id="delayTimeSlider" type="range" min="0.008" max="0.06" step="0.001" value="0.06" />
      </div>
      <div class="fxControl">
        <div class="fxHeader"><label for="delayAmountSlider">Delay Amount</label><span id="delayAmountValue">62%</span></div>
        <input id="delayAmountSlider" type="range" min="0" max="0.9" step="0.01" value="0.62" />
      </div>
      <div class="fxControl">
        <div class="fxHeader"><label for="stepsSlider">Steps</label><span id="stepsValue">6</span></div>
        <input id="stepsSlider" type="range" min="3" max="9" step="1" value="6" />
      </div>
      <div class="fxControl">
        <div class="fxHeader"><label for="pitchSemitoneSlider">Pitch</label><span id="pitchSemitoneValue">+0 st</span></div>
        <input id="pitchSemitoneSlider" type="range" min="-24" max="24" step="1" value="0" />
      </div>
    </div>

    <canvas id="app"></canvas>
    <script type="module" src="./main.js"></script>
  </body>
</html>
